name: Build TARC GUI

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            artifact_name: tarc-gui-windows-x64.exe
            executable: tarc-gui.exe
            qt_arch: win64_msvc2019_64
            
          # Linux x86_64
          - os: ubuntu-latest
            artifact_name: tarc-gui-linux-x86_64
            executable: tarc-gui
            qt_arch: gcc_64
            
          # macOS Universal (Intel + Apple Silicon)
          - os: macos-latest
            artifact_name: tarc-gui-macos-universal
            executable: tarc-gui.app/Contents/MacOS/tarc-gui
            qt_arch: clang_64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true

    # ────────────────────────────────────────────────────────────────────────
    # WINDOWS
    # ────────────────────────────────────────────────────────────────────────
    - name: Setup Qt6 (Windows)
      if: runner.os == 'Windows'
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        arch: ${{ matrix.qt_arch }}
        host: 'windows'
        target: 'desktop'
        install-deps: true
        
    - name: Setup MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    # ────────────────────────────────────────────────────────────────────────
    # LINUX
    # ────────────────────────────────────────────────────────────────────────
    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          libgl1-mesa-dev \
          libxcb-util1 \
          libxcb-util-dev \
          libxcb-icccm4-dev \
          libxcb-keysyms1-dev \
          libxcb-xinerama0-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libxcb-xkb-dev \
          libxcb-cursor-dev \
          libxcb-xrm-dev

    - name: Setup Qt6 (Linux)
      if: runner.os == 'Linux'
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        arch: ${{ matrix.qt_arch }}
        host: 'linux'
        target: 'desktop'
        install-deps: true

    # ────────────────────────────────────────────────────────────────────────
    # macOS
    # ────────────────────────────────────────────────────────────────────────
    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cmake ninja

    - name: Setup Qt6 (macOS)
      if: runner.os == 'macOS'
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        arch: ${{ matrix.qt_arch }}
        host: 'mac'
        target: 'desktop'
        install-deps: true

    # ────────────────────────────────────────────────────────────────────────
    # CONFIGURE & BUILD (Windows)
    # ────────────────────────────────────────────────────────────────────────
    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -G "Visual Studio 17 2022" \
          -A x64 \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_C_STANDARD=11 \
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

    - name: Build Project (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        cd build
        cmake --build . --config Release --parallel 2

    # ────────────────────────────────────────────────────────────────────────
    # CONFIGURE & BUILD (Linux/macOS)
    # ────────────────────────────────────────────────────────────────────────
    - name: Configure CMake (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -G "Unix Makefiles" \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_C_STANDARD=11 \
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

    - name: Build Project (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        cd build
        cmake --build . --config Release --parallel 2

    - name: Configure CMake (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -G "Unix Makefiles" \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_C_STANDARD=11 \
          -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

    - name: Build Project (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        cd build
        cmake --build . --config Release --parallel 2

    # ────────────────────────────────────────────────────────────────────────
    # FIND EXECUTABLE
    # ────────────────────────────────────────────────────────────────────────
    - name: Find executable (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        if (Test-Path "build/Release/tarc-gui.exe") {
          echo "EXECUTABLE_PATH=build/Release/tarc-gui.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        } elseif (Test-Path "build/tarc-gui.exe") {
          echo "EXECUTABLE_PATH=build/tarc-gui.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        } else {
          Get-ChildItem -Path build -Filter "tarc-gui.exe" -Recurse | Select-Object -First 1 | ForEach-Object { echo "EXECUTABLE_PATH=$($_.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append }
        }

    - name: Find executable (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        if [ -f "build/tarc-gui" ]; then
          echo "EXECUTABLE_PATH=build/tarc-gui" >> $GITHUB_ENV
        elif [ -f "build/Release/tarc-gui" ]; then
          echo "EXECUTABLE_PATH=build/Release/tarc-gui" >> $GITHUB_ENV
        else
          find build -name "tarc-gui" -executable -type f | head -1 | xargs -I {} echo "EXECUTABLE_PATH={}" >> $GITHUB_ENV
        fi

    - name: Find executable (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        if [ -d "build/tarc-gui.app" ]; then
          echo "EXECUTABLE_PATH=build/tarc-gui.app" >> $GITHUB_ENV
        elif [ -f "build/tarc-gui" ]; then
          echo "EXECUTABLE_PATH=build/tarc-gui" >> $GITHUB_ENV
        else
          find build -name "*.app" -type d | head -1 | xargs -I {} echo "EXECUTABLE_PATH={}" >> $GITHUB_ENV
        fi

    # ────────────────────────────────────────────────────────────────────────
    # TEST
    # ────────────────────────────────────────────────────────────────────────
    - name: Test executable (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        & ${{ env.EXECUTABLE_PATH }} --help
      continue-on-error: true

    - name: Test executable (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        chmod +x ${{ env.EXECUTABLE_PATH }}
        ${{ env.EXECUTABLE_PATH }} --help || true
      continue-on-error: true

    - name: Test executable (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        if [ -d "${{ env.EXECUTABLE_PATH }}" ]; then
          "${{ env.EXECUTABLE_PATH }}/Contents/MacOS/tarc-gui" --help || true
        fi
      continue-on-error: true

    # ────────────────────────────────────────────────────────────────────────
    # UPLOAD ARTIFACTS
    # ────────────────────────────────────────────────────────────────────────
    - name: Upload artifact (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ env.EXECUTABLE_PATH }}
        if-no-files-found: error

    - name: Upload artifact (Linux)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ env.EXECUTABLE_PATH }}
        if-no-files-found: error

    - name: Upload artifact (macOS)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ env.EXECUTABLE_PATH }}
        if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # CREATE RELEASE
  # ──────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Prepare release files
      run: |
        mkdir -p release_files
        
        # Windows
        if [ -f "artifacts/tarc-gui-windows-x64.exe/tarc-gui.exe" ]; then
          cp artifacts/tarc-gui-windows-x64.exe/tarc-gui.exe release_files/tarc-gui-windows-x64.exe
        fi
        
        # Linux
        if [ -f "artifacts/tarc-gui-linux-x86_64/tarc-gui" ]; then
          cp artifacts/tarc-gui-linux-x86_64/tarc-gui release_files/tarc-gui-linux-x86_64
          chmod +x release_files/tarc-gui-linux-x86_64
        fi
        
        # macOS
        if [ -d "artifacts/tarc-gui-macos-universal/tarc-gui.app" ]; then
          cp -r artifacts/tarc-gui-macos-universal/tarc-gui.app release_files/
        fi
        
        echo "✅ File preparati:"
        ls -lh release_files/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release_files/tarc-gui-windows-x64.exe
          release_files/tarc-gui-linux-x86_64
          release_files/tarc-gui.app/**
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}